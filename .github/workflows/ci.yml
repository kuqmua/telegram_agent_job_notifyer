name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_TIMEOUT: 60
  RUSTFLAGS: "-D warnings -D unreachable_pub -D dead_code"
  RUSTDOCFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  changed-files:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
            ci:
              - '.github/workflows/**'

  fmt:
    name: Formatting
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.profile }}
      - name: Build (${{ matrix.profile }})
        run: cargo build --all-targets --all-features ${{ matrix.profile == 'release' && '--release' || '' }}
      - name: Upload artifacts (release)
        if: matrix.profile == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: target/release/*server*
          if-no-files-found: warn
          retention-days: 7

  test:
    name: Test
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Test
        run: cargo nextest run --all-targets --all-features --profile ci
        env:
          RUSTFLAGS: "-D warnings"
      - name: Doc tests
        run: cargo test --doc --all-features

  doc:
    name: Docs
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Check docs
        run: cargo doc --all-features --no-deps --document-private-items

  msrv:
    name: MSRV
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Check MSRV
        run: cargo check --all-features

  audit:
    name: Security audit
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  machete:
    name: Unused deps
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete
      - run: cargo machete

  check-semver:
    name: Semver check
    needs: changed-files
    if: github.event_name == 'pull_request' && (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@nightly
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  ci-success:
    name: CI passed
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build, test, doc, msrv, audit, machete]
    permissions:
      contents: none
    steps:
      - name: Check all jobs passed
        run: |
          echo "fmt:      ${{ needs.fmt.result }}"
          echo "clippy:   ${{ needs.clippy.result }}"
          echo "build:    ${{ needs.build.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "doc:      ${{ needs.doc.result }}"
          echo "msrv:     ${{ needs.msrv.result }}"
          echo "audit:    ${{ needs.audit.result }}"
          echo "machete:  ${{ needs.machete.result }}"
          # skipped jobs (no changes) count as success
          for r in "${{ needs.fmt.result }}" "${{ needs.clippy.result }}" "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.doc.result }}" "${{ needs.msrv.result }}" "${{ needs.audit.result }}" "${{ needs.machete.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Job with result '$r' failed"
              exit 1
            fi
          done
          echo "All checks passed"
